body{font-family:Arial,sans-serif;background:#f0f4f8;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
header{background:#fff;border-bottom:1px solid #dde4ed;padding:10px 12px 6px;flex-shrink:0;text-align:center}
h1{font-size:18px;color:#1a3a5c}
.sub{font-size:11px;color:#5a7a9a;margin-top:2px}
#controls{display:flex;justify-content:center;align-items:center;gap:8px;padding:6px 10px;background:#f0f4f8;border-bottom:1px solid #dde4ed;flex-shrink:0;flex-wrap:wrap}
.btn{background:#fff;border:1px solid #c5d3e0;border-radius:8px;padding:6px 16px;font-size:13px;cursor:pointer;color:#1a3a5c;touch-action:manipulation;user-select:none;min-height:36px}
.btn:active{background:#dbeafe}
.hint{font-size:11px;color:#8aa0b8}
#viewport{flex:1;overflow:hidden;position:relative;touch-action:none;cursor:grab;background:#f8f9fb}
#viewport.dragging{cursor:grabbing}
#scene{position:absolute;top:0;left:0;transform-origin:0 0}
#scene svg{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;z-index:0}

/* ── Node cards ── */
.node-card{
  position:absolute;
  background:#fff;
  border:1.5px solid #6b8cba;
  border-radius:6px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:4px 8px;
  z-index:1;
  cursor:default;
}
.node-card .nm{font-weight:700;font-size:10.5px;color:#1a2a3a;line-height:1.3;word-break:break-word}
.node-card .sp{font-size:9.5px;color:#5a3a7a;font-style:italic;margin-top:2px;line-height:1.2}
.node-card .dec-tag{font-size:8px;color:#cc0000;font-weight:700;margin-top:1px}

/* generation colour bands */
.g1{background:#f5e6d3;border-color:#8B4513}.g1 .nm{color:#3a1a00}
.g2{background:#ffe4c4;border-color:#cd853f}.g2 .nm{color:#4a2a00}
.g3{background:#fff8dc;border-color:#daa520}.g3 .nm{color:#4a3a00}
.g4{background:#e8f5d0;border-color:#6b8e23}.g4 .nm{color:#2a3a00}
.g5{background:#d4edda;border-color:#3a7a2a}.g5 .nm{color:#1a4010}
.g6{background:#dbeafe;border-color:#60a5e8}.g6 .nm{color:#0c3060}

.g9{background:#d1fae5;border-color:#34d399}.g9 .nm{color:#064e3b}

.connector{fill:none;stroke:#6b8cba;stroke-width:1.5}

#legend{position:absolute;bottom:12px;right:12px;background:rgba(255,255,255,.96);border:1px solid #dde4ed;border-radius:10px;padding:8px 12px;font-size:10px;color:#444;z-index:200}

.leg-box{width:12px;height:12px;border-radius:3px;border:1.5px solid;flex-shrink:0}

/* ── Layout: LEFT-TO-RIGHT
   x = generation (depth), y = position among siblings
   NW = box width, NH = box height
   XGAP = horizontal gap between generations
   YGAP = vertical gap between siblings
────────────────────────────────────────── */
const NW = 130, NH = 48, XGAP = 28, YGAP = 8;

/* How many leaf rows does this subtree need? */
function leafCount(n) {
  if (!n.children || !n.children.length) return 1;
  return n.children.reduce((s,c) => s + leafCount(c), 0);
}

/* Assign _x (col), _y (top of row in px), _h (height in px) */
function layout(n, depth, yOffset) {
  n._x = depth * (NW + XGAP);
  const lc = leafCount(n);
  n._h = lc * (NH + YGAP) - YGAP;
  n._y = yOffset + (n._h - NH) / 2;   // vertically centre in its allocated height

  if (!n.children || !n.children.length) return;
  let cy = yOffset;
  for (const c of n.children) {
    const ch = leafCount(c) * (NH + YGAP) - YGAP;
    layout(c, depth + 1, cy);
    cy += ch + YGAP;
  }
}

layout(tree, 0, 10);

/* bounds */
let maxX = 0, maxY = 0;
function bnd(n) {
  maxX = Math.max(maxX, n._x + NW);
  maxY = Math.max(maxY, n._y + NH);
  n.children && n.children.forEach(bnd);
}

const scene  = document.getElementById('scene');
const svgEl  = document.getElementById('svglines');

svgEl.setAttribute('height', maxY + 40);
scene.style.width  = (maxX + 40) + 'px';
scene.style.height = (maxY + 40) + 'px';

/* ── Render nodes ── */
function makeCard(n) {
  const div = document.createElement('div');
  div.className = `node-card g${n.gen}`;
  div.style.left   = n._x + 'px';
  div.style.top    = n._y + 'px';
  div.style.width  = NW + 'px';
  div.style.minHeight = NH + 'px';

  /* Name */
  const nm = document.createElement('div');
  nm.className = 'nm';
  nm.textContent = n.name;
  if (n.dec) nm.style.color = '#cc0000';
  div.appendChild(nm);

  if (n.dec) {
    const dt = document.createElement('div');
    dt.className = 'dec-tag';
    dt.textContent = 'Deceased';
    div.appendChild(dt);
  }

  /* Spouses */
  const spouses = [];
  if (n.sp2)  spouses.push({name: n.sp2,  dec: false});
  if (n.sp)   spouses.push({name: n.sp,   dec: !!n.sp_dec});

  for (const sp of spouses) {
    const s = document.createElement('div');
    s.className = 'sp';
    s.textContent = '+ ' + sp.name;
    if (sp.dec) s.style.color = '#cc0000';
    div.appendChild(s);
  }

  scene.appendChild(div);
  n.children && n.children.forEach(makeCard);
}
makeCard(tree);

/* ── Render lines ── */
function drawLines(n) {
  if (!n.children || !n.children.length) return;

  /* Parent connector point: right-centre of this card */
  const px = n._x + NW;
  const py = n._y + NH / 2;

  /* Midpoint between parent right edge and children left edge */
  const midX = px + XGAP / 2;

  /* Children top and bottom centres */
  const firstCY = n.children[0]._y + NH / 2;
  const lastCY  = n.children[n.children.length - 1]._y + NH / 2;

  /* Horizontal stub right from parent */
  addLine(px, py, midX, py);

  /* Vertical bar connecting all children */
  addLine(midX, firstCY, midX, lastCY);

  /* Horizontal stubs left into each child */
  for (const c of n.children) {
    const cy = c._y + NH / 2;
    addLine(midX, cy, c._x, cy);
    drawLines(c);
  }
}

function addLine(x1, y1, x2, y2) {
  const path = document.createElementNS('http://www.w3.org/2000/svg','line');
  path.setAttribute('class','connector');
  path.setAttribute('x1', x1); path.setAttribute('y1', y1);
  path.setAttribute('x2', x2); path.setAttribute('y2', y2);
  svgEl.appendChild(path);
}

/* ── Pan & Zoom ── */
const vp = document.getElementById('viewport');
let scale = 0.55, tx = 20, ty = 20;

function applyT() {
  scene.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}

(function init() {
  tx = 20; ty = 20; applyT();
})();

let drag=false, ox,oy,otx,oty;
vp.addEventListener('mousedown',e=>{drag=true;vp.classList.add('dragging');ox=e.clientX;oy=e.clientY;otx=tx;oty=ty});
window.addEventListener('mousemove',e=>{if(!drag)return;tx=otx+(e.clientX-ox);ty=oty+(e.clientY-oy);applyT()});
window.addEventListener('mouseup',()=>{drag=false;vp.classList.remove('dragging')});
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=vp.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const ns=Math.min(3,Math.max(0.1,scale*(e.deltaY<0?1.12:0.9)));
  tx=mx-(mx-tx)*(ns/scale); ty=my-(my-ty)*(ns/scale); scale=ns; applyT();
},{passive:false});

let t1=null,t2=null,pd0,ps0,ptx0,pty0,pmx,pmy;
vp.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){t1=e.touches[0];t2=null;ox=t1.clientX;oy=t1.clientY;otx=tx;oty=ty}
  else if(e.touches.length>=2){
    t1=e.touches[0];t2=e.touches[1];
    pd0=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
    ps0=scale;ptx0=tx;pty0=ty;
    const r=vp.getBoundingClientRect();
    pmx=(t1.clientX+t2.clientX)/2-r.left;pmy=(t1.clientY+t2.clientY)/2-r.top;
  }
},{passive:false});
vp.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&!t2){
    tx=otx+(e.touches[0].clientX-ox);ty=oty+(e.touches[0].clientY-oy);applyT();
  } else if(e.touches.length>=2){
    const a=e.touches[0],b=e.touches[1];
    const dist=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
    const ns=Math.min(3,Math.max(0.1,ps0*(dist/pd0)));
    tx=pmx-(pmx-ptx0)*(ns/ps0);ty=pmy-(pmy-pty0)*(ns/ps0);scale=ns;applyT();
  }
},{passive:false});
vp.addEventListener('touchend',e=>{
  if(e.touches.length<2)t2=null;
  if(e.touches.length===1){ox=e.touches[0].clientX;oy=e.touches[0].clientY;otx=tx;oty=ty;}
},{passive:false});

function zoomBy(f){
  const cx=vp.clientWidth/2,cy=vp.clientHeight/2;
  const ns=Math.min(3,Math.max(0.1,scale*f));
  tx=cx-(cx-tx)*(ns/scale);ty=cy-(cy-ty)*(ns/scale);scale=ns;applyT();
}
function resetView(){scale=0.55;tx=20;ty=20;applyT();}
