/* ─────────────────────────────────────────
   LAYOUT
───────────────────────────────────────── */
function coupleW(n) {
  let w = NW;
  if (n.sp) w += GAP + NW;
  if (n.sp_left) w += GAP + NW;
  return w;
}

// X offset of the person card within its couple block
function personOff(n) {
  return n.sp_left ? (NW + GAP) : 0;
}

function subtreeW(n) {
  if (!n.children || !n.children.length) return coupleW(n);
  const childW = n.children.reduce((s, c) => s + subtreeW(c), 0)
               + (n.children.length - 1) * HGAP;
  return Math.max(coupleW(n), childW);
}

function layout(n, x, y) {
  const sw = subtreeW(n);
  const cw = coupleW(n);
  n._cx = x + sw / 2 - cw / 2;   // left edge of couple block
  n._y  = y;
  n._px = n._cx + personOff(n);  // left edge of person card

  if (!n.children || !n.children.length) return;
  const childW = n.children.reduce((s, c) => s + subtreeW(c), 0)
               + (n.children.length - 1) * HGAP;
  let lx = x + sw / 2 - childW / 2;
  for (const c of n.children) {
    layout(c, lx, y + NH + VGAP);
    lx += subtreeW(c) + HGAP;
  }
}

/* ─────────────────────────────────────────
   RENDER NODES
───────────────────────────────────────── */
const scene = document.getElementById('scene');
const svgEl = document.getElementById('svglines');

function hyphen() {
  const d = document.createElement('div');
  d.className = 'sp-hyphen';
  d.textContent = '—';
  return d;
}

function makeEl(n) {
  const wrap = document.createElement('div');
  wrap.className = 'couple';
  wrap.style.left = n._cx + 'px';
  wrap.style.top  = n._y + 'px';

  // left spouse
  if (n.sp_left) {
    const el = document.createElement('div');
    el.className = 'node spouse';
    el.innerHTML = `<div class="nm">${n.sp_left}</div>`;
    if (n.sp_left_dec) el.innerHTML += `<div class="dec-tag">Deceased</div>`;
    wrap.appendChild(el);
    wrap.appendChild(hyphen());
  }

  // main person
  const p = document.createElement('div');
  p.className = `node g${n.gen} person`;
  p.innerHTML = `<div class="nm">${n.name}</div>`;
  if (n.dec) p.innerHTML += `<div class="dec-tag">Deceased</div>`;
  wrap.appendChild(p);

  // right spouse
  if (n.sp) {
    wrap.appendChild(hyphen());
    const el = document.createElement('div');
    el.className = 'node spouse';
    el.innerHTML = `<div class="nm">${n.sp}</div>`;
    if (n.sp_dec) el.innerHTML += `<div class="dec-tag">Deceased</div>`;
    wrap.appendChild(el);
  }

  scene.appendChild(wrap);
}

/* ─────────────────────────────────────────
   RENDER LINES
───────────────────────────────────────── */
function drawLines(n) {
  if (!n.children || !n.children.length) return;
  // line comes from bottom-centre of the PERSON card only
  const px  = n._px + NW / 2;
  const py  = n._y + NH;
  const mid = py + VGAP / 2;

  for (const c of n.children) {
    const cx = c._px + NW / 2;
    const cy = c._y;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('class', 'connector');
    path.setAttribute('d', `M${px},${py} L${px},${mid} L${cx},${mid} L${cx},${cy}`);
    svgEl.appendChild(path);
    drawLines(c);
  }
}

function traverse(n, fn) {
  fn(n);
  if (n.children) n.children.forEach(c => traverse(c, fn));
}

traverse(tree, makeEl);
drawLines(tree);

  maxX = Math.max(maxX, n._cx + coupleW(n) + 40);
  maxY = Math.max(maxY, n._y + NH + 40);
});
svgEl.setAttribute('width', maxX);
svgEl.setAttribute('height', maxY);

scene.style.height = maxY + 'px';

let scale = 0.6, tx = 0, ty = 20;

function applyT() {
  scene.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}

// Centre the root on load
(function init() {
  const rootCX = tree._px + NW / 2;
  tx = vp.clientWidth / 2 - rootCX * scale;
  applyT();
})();

/* — Mouse drag — */
let drag = false, ox, oy, otx, oty;
vp.addEventListener('mousedown', e => {
  drag = true; vp.classList.add('dragging');
  ox = e.clientX; oy = e.clientY; otx = tx; oty = ty;
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  tx = otx + (e.clientX - ox);
  ty = oty + (e.clientY - oy);
  applyT();
});
window.addEventListener('mouseup', () => { drag = false; vp.classList.remove('dragging'); });

/* — Scroll zoom (desktop) — */
vp.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = vp.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 0.9;
  const ns = Math.min(3, Math.max(0.1, scale * factor));
  tx = mx - (mx - tx) * (ns / scale);
  ty = my - (my - ty) * (ns / scale);
  scale = ns;
  applyT();
}, { passive: false });

/* — Touch: single-finger pan + two-finger pinch zoom — */
let t1 = null, t2 = null, pinchDist0, pinchScale0, pinchTx0, pinchTy0, pinchMx, pinchMy;
let panTx0, panTy0, panX0, panY0;

vp.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    t1 = e.touches[0];
    t2 = null;
    panX0 = t1.clientX; panY0 = t1.clientY;
    panTx0 = tx; panTy0 = ty;
  } else if (e.touches.length >= 2) {
    t1 = e.touches[0]; t2 = e.touches[1];
    pinchDist0 = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
    pinchScale0 = scale;
    pinchTx0 = tx; pinchTy0 = ty;
    const rect = vp.getBoundingClientRect();
    pinchMx = (t1.clientX + t2.clientX) / 2 - rect.left;
    pinchMy = (t1.clientY + t2.clientY) / 2 - rect.top;
  }
}, { passive: false });

vp.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && !t2) {
    const dx = e.touches[0].clientX - panX0;
    const dy = e.touches[0].clientY - panY0;
    tx = panTx0 + dx;
    ty = panTy0 + dy;
    applyT();
  } else if (e.touches.length >= 2) {
    const a = e.touches[0], b = e.touches[1];
    const dist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const ns = Math.min(3, Math.max(0.1, pinchScale0 * (dist / pinchDist0)));
    tx = pinchMx - (pinchMx - pinchTx0) * (ns / pinchScale0);
    ty = pinchMy - (pinchMy - pinchTy0) * (ns / pinchScale0);
    scale = ns;
    applyT();
  }
}, { passive: false });

vp.addEventListener('touchend', e => {
  if (e.touches.length === 0) { t1 = null; t2 = null; }
  else if (e.touches.length === 1) {
    t2 = null;
    panX0 = e.touches[0].clientX; panY0 = e.touches[0].clientY;
    panTx0 = tx; panTy0 = ty;
  }
}, { passive: false });

function zoomBy(f) {
  const cx = vp.clientWidth / 2, cy = vp.clientHeight / 2;
  const ns = Math.min(3, Math.max(0.1, scale * f));
  tx = cx - (cx - tx) * (ns / scale);
  ty = cy - (cy - ty) * (ns / scale);
  scale = ns;
  applyT();
}

function resetView() {
  scale = 0.6; ty = 20;
  const rootCX = tree._px + NW / 2;
  tx = vp.clientWidth / 2 - rootCX * scale;
