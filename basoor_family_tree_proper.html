
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);overflow:hidden}
#wrap{width:100%;height:780px;overflow:hidden;cursor:grab;user-select:none;position:relative}
#wrap.dragging{cursor:grabbing}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}
.node{position:absolute;border-radius:8px;padding:5px 8px;font-size:11px;line-height:1.35;text-align:center;cursor:pointer;transition:box-shadow .15s;min-width:90px;max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node:hover{box-shadow:0 0 0 2px var(--color-border-primary)}
.name{font-weight:500;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp{font-size:10px;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g1{background:#EAF3DE;border:1px solid #97C459;color:#27500A}
.g2{background:#E6F1FB;border:1px solid #85B7EB;color:#0C447C}
.g3{background:#EEEDFE;border:1px solid #AFA9EC;color:#26215C}
.g4{background:#FAEEDA;border:1px solid #EF9F27;color:#412402}
.g5{background:#E1F5EE;border:1px solid #5DCAA5;color:#04342C}
.dec{text-decoration:line-through;opacity:.55}
.gen-label{position:absolute;left:10px;font-size:10px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.05em;text-transform:uppercase;pointer-events:none}
svg.lines{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.connector{fill:none;stroke:var(--color-border-secondary);stroke-width:1.2}
.controls{position:absolute;bottom:10px;right:10px;display:flex;gap:6px;z-index:10}
.btn{background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--color-text-primary)}
.btn:hover{background:var(--color-background-primary)}
.legend{position:absolute;top:10px;right:10px;background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);border-radius:8px;padding:8px 10px;font-size:10px;z-index:10}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
@media(prefers-color-scheme:dark){
.g1{background:#173404;border-color:#3B6D11;color:#C0DD97}
.g2{background:#042C53;border-color:#185FA5;color:#B5D4F4}
.g3{background:#26215C;border-color:#534AB7;color:#CECBF6}
.g4{background:#412402;border-color:#854F0B;color:#FAC775}
.g5{background:#04342C;border-color:#0F6E56;color:#9FE1CB}
}
</style>

<div id="wrap">
<svg class="lines" id="svg" width="3200" height="3000"></svg>
<div id="canvas" id="nodes"></div>
<div class="legend">
  <div class="leg-row"><div class="leg-dot g1"></div><span style="color:var(--color-text-secondary)">Gen 1 — Patriarch</span></div>
  <div class="leg-row"><div class="leg-dot g2"></div><span style="color:var(--color-text-secondary)">Gen 2 — Children</span></div>
  <div class="leg-row"><div class="leg-dot g3"></div><span style="color:var(--color-text-secondary)">Gen 3 — Grandchildren</span></div>
  <div class="leg-row"><div class="leg-dot g4"></div><span style="color:var(--color-text-secondary)">Gen 4 — Great-grandchildren</span></div>
  <div class="leg-row"><div class="leg-dot g5"></div><span style="color:var(--color-text-secondary)">Gen 5 — 5th generation</span></div>
</div>
<div class="controls">
  <button class="btn" onclick="zoom(1.2)">＋</button>
  <button class="btn" onclick="zoom(0.8)">－</button>
  <button class="btn" onclick="reset()">Reset</button>
</div>
</div>

<script>

const data = {

        {
          id:'bunny', name:'Bunny Basoor', sp:'Pinky Basoor', cls:'g3',
          children:[
            {id:'parv', name:'Parv Basoor', sp:'', cls:'g4'}
          ]
        }
      ]
    },
    {
      id:'avtar', name:'Avtar Singh Basoor', sp:'Sudarshan Kaur', cls:'g2',
      children:[
        {id:'sonia_c', name:'Sonia Chug', sp:'Bittu Chug', cls:'g3'},
        {
          id:'sanju', name:'Sanju Basoor', sp:'Sonia Basoor', cls:'g3',
          children:[
            {
              id:'saman', name:'Saman Basoor', sp:'Vanshika', cls:'g4',
              children:[
                {id:'saman_ch', name:'(children)', sp:'', cls:'g5'}
              ]
            },
            {id:'sanraj', name:'Sanraj Basoor', sp:'', cls:'g4'}
          ]
        }
      ]

    {
      id:'triloch', name:'Trilochan Singh', sp:'Minna Basoor†', cls:'g2',

        {
          id:'chinky', name:'Chinky Basoor', sp:'Sona Basoor', cls:'g3',
          children:[
            {id:'guneet', name:'Guneet', sp:'', cls:'g4'},
            {id:'jivraj', name:'Jivraj', sp:'', cls:'g4'}
          ]
        },
        {id:'rasna', name:'Rasna Basoor', sp:'Happy', cls:'g3'}
      ]
    },
    {
      id:'harjeet', name:'Harjeet Singh', sp:'Rupinder', cls:'g2',
      children:[
        {
          id:'resham', name:'Resham', sp:'Soni', cls:'g3',
          children:[
            {id:'trishman', name:'Trishman', sp:'', cls:'g4'},

    {

      children:[
        {id:'joy', name:'Joy Bedi', sp:'', cls:'g3 dec', dec:true},
        {id:'rahul', name:'Rahul Bedi', sp:'Ruby', cls:'g3'},
        {id:'preeti', name:'Preeti Chawla', sp:'', cls:'g3'}
      ]
    }
  ]
};

const positions = {};

function subtreeWidth(node){
  if(!node.children || node.children.length===0) return NW;
  const childrenW = node.children.reduce((s,c)=>s+subtreeWidth(c),0)+(node.children.length-1)*HGAP;
  return Math.max(NW, childrenW);
}

function layout(node, x, y){
  const sw = subtreeWidth(node);
  const cx = x + sw/2 - NW/2;
  positions[node.id] = {x:cx, y};
  if(!node.children || node.children.length===0) return;
  const totalW = node.children.reduce((s,c)=>s+subtreeWidth(c),0)+(node.children.length-1)*HGAP;
  let childX = x + sw/2 - totalW/2;
  for(const child of node.children){
    const csw = subtreeWidth(child);
    layout(child, childX, y + NH + VGAP);
    childX += csw + HGAP;
  }
}

layout(data, 20, 30);

const canvas = document.getElementById('canvas');
const svg = document.getElementById('svg');

function makeNode(node){
  const pos = positions[node.id];
  const div = document.createElement('div');
  div.className = 'node ' + node.cls;
  div.style.left = pos.x + 'px';
  div.style.top = pos.y + 'px';
  div.style.width = NW + 'px';
  div.style.height = NH + 'px';
  div.style.display = 'flex';
  div.style.flexDirection = 'column';
  div.style.justifyContent = 'center';
  const nameEl = document.createElement('div');
  nameEl.className = 'name' + (node.dec ? ' dec' : '');
  nameEl.textContent = node.name;
  nameEl.title = node.name;
  div.appendChild(nameEl);
  if(node.sp){
    const spEl = document.createElement('div');
    spEl.className = 'sp';
    spEl.textContent = '+ ' + node.sp;
    spEl.title = node.sp;
    div.appendChild(spEl);
  }
  canvas.appendChild(div);
}

function drawLines(node){
  if(!node.children || node.children.length===0) return;
  const p = positions[node.id];
  const px = p.x + NW/2;
  const py = p.y + NH;
  const midY = py + VGAP/2;

  for(const child of node.children){
    const cp = positions[child.id];
    const cx = cp.x + NW/2;
    const cy = cp.y;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','connector');
    path.setAttribute('d', `M${px},${py} L${px},${midY} L${cx},${midY} L${cx},${cy}`);
    svg.appendChild(path);
    drawLines(child);
  }
}

function traverse(node, fn){
  fn(node);
  if(node.children) node.children.forEach(c=>traverse(c,fn));
}

traverse(data, makeNode);
drawLines(data);

let scale = 0.72, tx = 30, ty = 10;
const wrap = document.getElementById('wrap');
let dragging = false, startX, startY, startTx, startTy;

function applyT(){
  document.getElementById('canvas').style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  svg.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}
applyT();

wrap.addEventListener('mousedown', e=>{
  dragging=true; wrap.classList.add('dragging');
  startX=e.clientX; startY=e.clientY; startTx=tx; startTy=ty;
});
window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  tx=startTx+(e.clientX-startX); ty=startTy+(e.clientY-startY); applyT();
});
window.addEventListener('mouseup', ()=>{ dragging=false; wrap.classList.remove('dragging'); });

wrap.addEventListener('touchstart', e=>{
  const t=e.touches[0]; startX=t.clientX; startY=t.clientY; startTx=tx; startTy=ty;
},{passive:true});
wrap.addEventListener('touchmove', e=>{
  const t=e.touches[0]; tx=startTx+(t.clientX-startX); ty=startTy+(t.clientY-startY); applyT();
},{passive:true});

wrap.addEventListener('wheel', e=>{
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.min(2, Math.max(0.3, scale*delta));
  applyT();
},{passive:false});

function zoom(f){ scale=Math.min(2,Math.max(0.3,scale*f)); applyT(); }
function reset(){ scale=0.72; tx=30; ty=10; applyT(); }
</script>
